<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Weather App</title>

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
            transition: 1s ease;
            position: relative;
        }

        /* ===== BACKGROUNDS ===== */

        body.sunny {
            background: linear-gradient(to bottom,
                    #4facfe,
                    #00f2fe);
        }

        body.rainy {
            background: linear-gradient(to bottom,
                    #141e30,
                    #243b55);
        }

        body.cloudy {
            background: linear-gradient(to bottom,
                    #757f9a,
                    #d7dde8);
        }

        body.snowy {
            background: linear-gradient(to bottom,
                    #83a4d4,
                    #b6fbff);
        }

        /* ===== CONTAINER ===== */

        .container {
            width: 92%;
            max-width: 1300px;
            margin: auto;
            padding: 40px 0;
            position: relative;
            z-index: 10;
        }

        /* ===== TITLE ===== */

        .title {
            text-align: center;
            margin-bottom: 35px;
        }

        .title h1 {
            font-size: 55px;
            text-shadow:
                0 0 15px rgba(255, 255, 255, 0.6);
        }

        /* ===== SEARCH ===== */

        .search-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        input {
            width: 350px;
            padding: 17px 22px;

            border: none;
            border-radius: 50px;

            outline: none;

            font-size: 17px;

            background: rgba(255, 255, 255, 0.15);

            backdrop-filter: blur(12px);

            color: white;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        button {
            padding: 16px 28px;

            border: none;
            border-radius: 50px;

            background: white;
            color: #111;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;

            transition: .3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* ===== MAIN CARD ===== */

        .main-weather {
            width: 100%;

            padding: 40px;

            border-radius: 35px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow:
                0 10px 35px rgba(0, 0, 0, 0.3);

            margin-bottom: 35px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            flex-wrap: wrap;
        }

        .left-side h2 {
            font-size: 52px;
            margin-bottom: 10px;
        }

        .left-side p {
            font-size: 22px;
            text-transform: capitalize;
        }

        .temp {
            font-size: 100px;
            font-weight: bold;
        }

        .weather-icon {
            font-size: 90px;
            text-align: center;
        }

        /* ===== SMALL CARDS ===== */

        .weatherData,
        .forecast-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 22px;
        }

        .card {
            width: 220px;

            padding: 28px 22px;

            border-radius: 25px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(14px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            transition: .4s;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.03);
        }

        .card i {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .card h3,
        .card h4 {
            margin-bottom: 12px;
            font-size: 22px;
        }

        .card p {
            font-size: 20px;
        }

        .forecast-title {
            text-align: center;
            margin: 50px 0 25px;
            font-size: 40px;
        }

        /* ===== SUN ===== */

        .sun {
            position: absolute;
            width: 140px;
            height: 140px;
            background: #ffd93d;
            border-radius: 50%;
            top: 70px;
            right: 80px;

            box-shadow:
                0 0 80px #ffd93d;

            animation: glow 3s infinite;

            display: none;
        }

        @keyframes glow {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        /* ===== CLOUDS ===== */

        .cloud {
            position: absolute;
            width: 220px;
            height: 70px;

            background: rgba(255, 255, 255, 0.8);

            border-radius: 100px;

            top: 100px;

            animation: moveCloud 20s linear infinite;

            display: none;
        }

        .cloud::before,
        .cloud::after {
            content: "";
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .cloud::before {
            width: 90px;
            height: 90px;
            top: -40px;
            left: 25px;
        }

        .cloud::after {
            width: 110px;
            height: 110px;
            top: -55px;
            right: 20px;
        }

        .cloud2 {
            top: 220px;
            animation-duration: 28s;
        }

        @keyframes moveCloud {
            from {
                transform: translateX(-300px);
            }

            to {
                transform: translateX(1800px);
            }
        }

        /* ===== RAIN ===== */

        .rain {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            width: 2px;
            height: 20px;

            background: rgba(255, 255, 255, 0.5);

            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            to {
                transform: translateY(120vh);
            }
        }

        /* ===== SNOW ===== */

        .snow {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: none;
        }

        .flake {
            position: absolute;
            color: white;
            font-size: 18px;
            animation: snowFall linear infinite;
        }

        @keyframes snowFall {
            to {
                transform: translateY(120vh);
            }
        }

        /* ===== RESPONSIVE ===== */

        @media(max-width:768px) {

            .title h1 {
                font-size: 38px;
            }

            .main-weather {
                text-align: center;
                justify-content: center;
            }

            .temp {
                font-size: 70px;
            }

            input {
                width: 100%;
            }

            .card {
                width: 100%;
            }
        }
    </style>
</head>

<body class="sunny">

    <!-- Animations -->

    <div class="sun"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div class="rain" id="rain"></div>

    <div class="snow" id="snow"></div>

    <div class="container">

        <div class="title">
            <h1>
                <i class="fa-solid fa-cloud-sun"></i>
                Weather App
            </h1>
        </div>

        <div class="search-box">

            <input type="text"
                id="city"
                placeholder="Search your city...">

            <button onclick="getWeather()">
                Search
            </button>

        </div>

        <div id="mainWeather"></div>

        <div id="weatherData"
            class="weatherData"></div>

        <h2 class="forecast-title">
            5-Day Forecast
        </h2>

        <div id="forecast"
            class="forecast-container"></div>

    </div>

    <script>

        const apiKey =
            "f66d9727501911f62c328508b94c5e3e";

        // ===== RAIN =====

        function createRain() {

            const rain =
                document.getElementById("rain");

            rain.innerHTML = "";

            for (let i = 0; i < 120; i++) {

                const drop =
                    document.createElement("div");

                drop.classList.add("drop");

                drop.style.left =
                    Math.random() * window.innerWidth + "px";

                drop.style.animationDuration =
                    (Math.random() * 1 + 0.5) + "s";

                rain.appendChild(drop);
            }
        }

        createRain();

        // ===== SNOW =====

        function createSnow() {

            const snow =
                document.getElementById("snow");

            snow.innerHTML = "";

            for (let i = 0; i < 70; i++) {

                const flake =
                    document.createElement("div");

                flake.classList.add("flake");

                flake.innerHTML = "❄";

                flake.style.left =
                    Math.random() * window.innerWidth + "px";

                flake.style.animationDuration =
                    (Math.random() * 5 + 5) + "s";

                snow.appendChild(flake);
            }
        }

        createSnow();

        function formatTime(timestamp) {

            return new Date(timestamp * 1000)
                .toLocaleTimeString();

        }

        // ===== CHANGE BACKGROUND =====

        function changeWeatherEffect(weather) {

            document.body.className = "";

            document.querySelector(".sun")
                .style.display = "none";

            document.querySelectorAll(".cloud")
                .forEach(c => c.style.display = "none");

            document.getElementById("rain")
                .style.display = "none";

            document.getElementById("snow")
                .style.display = "none";

            weather = weather.toLowerCase();

            // SUNNY

            if (weather.includes("clear")) {

                document.body.classList.add("sunny");

                document.querySelector(".sun")
                    .style.display = "block";
            }

            // CLOUDY

            else if (weather.includes("cloud")) {

                document.body.classList.add("cloudy");

                document.querySelectorAll(".cloud")
                    .forEach(c => c.style.display = "block");
            }

            // RAIN

            else if (
                weather.includes("rain") ||
                weather.includes("drizzle") ||
                weather.includes("thunderstorm")
            ) {

                document.body.classList.add("rainy");

                document.querySelectorAll(".cloud")
                    .forEach(c => c.style.display = "block");

                document.getElementById("rain")
                    .style.display = "block";
            }

            // SNOW

            else if (weather.includes("snow")) {

                document.body.classList.add("snowy");

                document.getElementById("snow")
                    .style.display = "block";
            }

            else {

                document.body.classList.add("cloudy");
            }
        }

        // ===== WEATHER =====

        function getWeather() {

            const city =
                document.getElementById("city").value;

            if (!city) {
                alert("Please enter city name");
                return;
            }

            const weatherUrl =
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

            const forecastUrl =
                `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`;

            // Current Weather

            fetch(weatherUrl)

                .then(res => res.json())

                .then(data => {

                    changeWeatherEffect(
                        data.weather[0].main
                    );

                    document.getElementById("mainWeather")
                        .innerHTML = `

                <div class="main-weather">

                    <div class="left-side">

                        <h2>
                            ${data.name},
                            ${data.sys.country}
                        </h2>

                        <p>
                            ${data.weather[0].description}
                        </p>

                    </div>

                    <div class="right-side">

                        <div class="weather-icon">
                            <i class="fa-solid fa-cloud-sun"></i>
                        </div>

                        <div class="temp">
                            ${Math.round(data.main.temp)}°
                        </div>

                    </div>

                </div>

            `;

                    document.getElementById("weatherData")
                        .innerHTML = `

            <div class="card">
              <i class="fa-solid fa-temperature-high"></i>
              <h3>Max Temp</h3>
              <p>${data.main.temp_max} °C</p>
            </div>

            <div class="card">
              <i class="fa-solid fa-temperature-low"></i>
              <h3>Min Temp</h3>
              <p>${data.main.temp_min} °C</p>
            </div>

            <div class="card">
              <i class="fa-solid fa-droplet"></i>
              <h3>Humidity</h3>
              <p>${data.main.humidity}%</p>
            </div>

            <div class="card">
              <i class="fa-solid fa-sun"></i>
              <h3>Sunrise</h3>
              <p>${formatTime(data.sys.sunrise)}</p>
            </div>

            <div class="card">
              <i class="fa-solid fa-moon"></i>
              <h3>Sunset</h3>
              <p>${formatTime(data.sys.sunset)}</p>
            </div>

            <div class="card">
              <i class="fa-solid fa-gauge-high"></i>
              <h3>Pressure</h3>
              <p>${data.main.pressure} hPa</p>
            </div>

          `;
                })

                .catch(err => {
                    console.error(err);
                    alert("City not found!");
                });

            // Forecast

            fetch(forecastUrl)

                .then(res => res.json())

                .then(data => {

                    const forecastDiv =
                        document.getElementById("forecast");

                    forecastDiv.innerHTML = "";

                    const uniqueDays = [];

                    data.list.forEach(item => {

                        const date =
                            new Date(item.dt * 1000)
                            .getDate();

                        if (
                            !uniqueDays.includes(date) &&
                            uniqueDays.length < 5
                        ) {

                            uniqueDays.push(date);

                            const div =
                                document.createElement("div");

                            div.className = "card";

                            div.innerHTML = `

                <i class="fa-solid fa-cloud-sun-rain"></i>

                <h4>
                  ${new Date(item.dt * 1000)
                                    .toLocaleDateString()}
                </h4>

                <p>
                  ${item.weather[0].description}
                </p>

                <p>
                  ${Math.round(item.main.temp)} °C
                </p>

              `;

                            forecastDiv.appendChild(div);
                        }

                    });

                })

                .catch(err => console.error(err));
        }

    </script>

</body>

</html>
